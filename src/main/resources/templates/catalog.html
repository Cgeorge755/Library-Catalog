<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LibraTech Catalog</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .catalog-box {
            background: white;
            width: 700px;
            padding: 30px;
            border-radius: 10px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #123d6b;
            color: white;
        }

        a {
            text-decoration: none;
            color: #123d6b;
        }
    </style>
</head>
<body>
<div class="catalog-box">
    <h1>LibraTech Catalog</h1>

    <form th:action="@{/catalog}" method="get" class="search-bar">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by title or author">
        <button type="submit">Search</button>
    </form>

    <table>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Genre</th>
        </tr>
        <tr th:each="book : ${books}">
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.genre}"></td>
        </tr>
    </table>

    <p style="text-align:center; margin-top:20px;">
        <a th:href="@{/login}">Back to Login</a>
    </p>
</div>
</body>
</html>
